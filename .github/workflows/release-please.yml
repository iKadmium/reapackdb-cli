name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          release-type: rust

      - name: Trigger release workflow
        if: steps.release.outputs.release_created
        run: |
          gh workflow run release.yml --ref ${{ steps.release.outputs.tag_name }}
        env:
          GH_TOKEN: ${{ github.token }}
